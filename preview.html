<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranking Competitivo Dermocosmética</title>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#fff7ee;color:#8a663f}
.container{max-width:1200px;margin:60px auto;padding:20px}
h1{text-align:center;font-weight:600;letter-spacing:2px;margin-bottom:40px}
.table-container{overflow-x:auto;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,0.08);background:#ffffff}
table{width:100%;border-collapse:collapse}
thead{background:#e8debd}
th{padding:16px;font-size:13px;text-transform:uppercase;letter-spacing:1px}
td{padding:16px;text-align:center;font-size:14px;border-bottom:1px solid #f0e6d6}
tr{transition:all .3s ease}
tbody tr:hover{background:#fff;transform:scale(1.01);box-shadow:0 8px 20px rgba(0,0,0,0.06)}
.rank{font-weight:600}
.brand{text-align:left;font-weight:500}
.badge{padding:6px 12px;border-radius:20px;font-size:12px;background:#8a663f;color:#fff}
.metric{font-weight:500}
.low{color:#c94c4c}
.mid{color:#d4a373}
.high{color:#6a994e}
@media(max-width:768px){th,td{padding:10px;font-size:12px}}
</style>
</head>

<td class="high">4.2</td>
</tr>
<tr>

</div>

</html>
